<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronQuest</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="app">

<!-- HOME -->
<div id="screen-home" class="screen active">

<h1>IronQuest</h1>

<div class="card">
<h2>Level 1</h2>

<div class="xp-bar">
<div class="xp-fill"></div>
</div>

<p>XP 0 / 125</p>
</div>

</div>

<!-- WORKOUT -->
<div id="screen-workout" class="screen">

<h1 id="workout-title">Treino</h1>

<div id="workout-picker">
<button class="primary" onclick="openWorkout('push')">PUSH</button>
<button class="primary" onclick="openWorkout('pull')">PULL</button>
<button class="primary" onclick="openWorkout('legs')">LEGS</button>
</div>

<div id="workout-list"></div>

<div id="finish-container" style="display:none;margin-top:20px">
<button class="primary" onclick="finishWorkout()">FINALIZAR TREINO</button>
</div>

</div>

<!-- PROFILE -->
<div id="screen-profile" class="screen">

<h1>Perfil</h1>

<div class="card" id="profile-card">

<div id="profile-view"></div>

<div id="profile-edit" style="display:none">

<input id="age" placeholder="Idade">
<input id="height" placeholder="Altura cm">
<input id="weight" placeholder="Peso kg">

<button class="primary" onclick="saveProfile()">Guardar</button>

</div>

<button class="primary" onclick="editProfile()">Editar</button>

</div>

<h2>Stats</h2>

<div class="card">
<select id="exercise-select"></select>
</div>

<div class="card">
<canvas id="pr-chart" height="200"></canvas>
</div>

<div class="card" id="exercise-info"></div>

</div>

</div>

<div class="navbar" id="navbar">
<button onclick="showScreen('home')">Home</button>
<button onclick="showScreen('workout')">Treino</button>
<button onclick="showScreen('profile')">Perfil</button>
</div>

<div id="levelup-popup" class="popup" style="display:none">
<div class="popup-card">
<h2>⭐ LEVEL UP ⭐</h2>
<p id="levelup-text"></p>
<button onclick="closeLevelUp()">Continuar</button>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
