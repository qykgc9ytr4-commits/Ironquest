<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronQuest</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <!-- HOME -->
    <div id="screen-home" class="screen active">
        <h1>IronQuest</h1>

        <div class="card">
            <h2>Level 3</h2>
            <div class="xp-bar">
                <div class="xp-fill"></div>
            </div>
            <p>XP 120 / 200</p>
        </div>

        <div class="card">
            <h3>Resumo semanal</h3>
            <p>Treinos: 2</p>
            <p>Tempo: 110 min</p>
        </div>
    </div>

    <!-- TREINO -->
    <div id="screen-workout" class="screen">
        <h1>Treino</h1>

        <div class="card">
            <button class="primary">PUSH</button>
            <button class="primary">PULL</button>
            <button class="primary">LEGS</button>
        </div>
    </div>

    <!-- PERFIL -->
    <div id="screen-profile" class="screen">
        <h1>Perfil</h1>

        <div class="card">
            <p>Peso atual: 88kg</p>
            <p>Total treinos: 12</p>
        </div>
    </div>

</div>

<!-- NAVBAR -->
<div class="navbar">
    <button onclick="showScreen('home')">Home</button>
    <button onclick="showScreen('workout')">Treino</button>
    <button onclick="showScreen('profile')">Perfil</button>
</div>

<script src="app.js"></script>

</body>
</html>
