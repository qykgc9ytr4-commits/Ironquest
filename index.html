<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronQuest</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:16px;
margin-top:20px;
}

button{
background:#ff3b3b;
border:none;
padding:16px;
width:100%;
color:white;
font-size:18px;
border-radius:12px;
margin-top:10px;
}

.bar{
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
background:#4cff4c;
width:30%;
}

</style>
</head>

<body>

<h1>🔥 IronQuest</h1>

<div class="card">
<h2>Level 1</h2>
<div class="bar"><div class="fill"></div></div>
<p>XP: 120 / 400</p>
</div>

<div class="card">
<h2>Missão de hoje</h2>
<button onclick="start()">START QUEST</button>
</div>

<script>
function start(){
alert("Treino iniciado 💪")
}
</script>

</body>
</html>
